[project]
name = "uipath-langchain-client"
description = "LangChain-compatible chat models and embeddings for UiPath's LLM services"
dynamic = ["version"]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "langchain>=1.2.13",
    "uipath-llm-client>=1.5.10",
]

[project.optional-dependencies]
openai = [
    "langchain-openai>=1.1.11",
]
google = [
    "langchain-google-genai>=4.2.1",
]
anthropic = [
    "langchain-anthropic>=1.4.0",
    "anthropic[bedrock,vertex]>=0.86.0",
]
aws = [
    "langchain-aws[anthropic]>=1.4.1",
]
vertexai = [
    "langchain-google-vertexai>=3.2.2",
]
azure = [
    "langchain-azure-ai>=1.1.1",
]
fireworks = [
    "langchain-fireworks>=1.1.0",
]
all = [
    "uipath-langchain-client[openai,aws,google,anthropic,azure,vertexai,fireworks]"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/uipath_langchain_client"]

[tool.hatch.version]
path = "src/uipath_langchain_client/__version__.py"
